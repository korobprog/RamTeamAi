<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neurogate — онбординг</title>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
</head>
<body>
<div class="canvas">
<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 24px 20px;">

  <div style="max-width:460px; margin:0 auto; text-align:center;">
    <div style="width:48px; height:48px; border-radius:12px; background:#EEEDFE; display:flex; align-items:center; justify-content:center; margin:0 auto 12px; color:#534AB7;"><i class="ti ti-hexagon" aria-hidden="true" style="font-size:26px;"></i></div>
    <div style="font-size:18px; font-weight:500;">Добро пожаловать в Neurogate</div>
    <div style="font-size:13px; color:var(--color-text-secondary); margin-top:4px;">Любые ИИ-API. Команды агентов. Планирование вместе.</div>
  </div>

  <div style="display:flex; flex-direction:column; gap:10px; margin-top:20px;">

    <div style="display:flex; align-items:center; gap:12px; background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:14px;">
      <div style="width:28px; height:28px; border-radius:50%; background:var(--color-background-success); color:var(--color-text-success); display:flex; align-items:center; justify-content:center; font-size:14px;"><i class="ti ti-check" aria-hidden="true"></i></div>
      <div style="flex:1;">
        <div style="font-size:13px; font-weight:500;">Подключить API</div>
        <div style="font-size:12px; color:var(--color-text-secondary);">Anthropic, OpenAI, локальные или кастомные.</div>
      </div>
      <span style="font-size:11px; color:var(--color-text-success);">готово</span>
    </div>

    <div style="display:flex; align-items:center; gap:12px; background:var(--color-background-primary); border:2px solid var(--color-border-info); border-radius:var(--border-radius-lg); padding:14px;">
      <div style="width:28px; height:28px; border-radius:50%; background:var(--color-background-info); color:var(--color-text-info); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:500;">2</div>
      <div style="flex:1;">
        <div style="font-size:13px; font-weight:500;">Собрать команду</div>
        <div style="font-size:12px; color:var(--color-text-secondary);">Выбери модели и роли агентов.</div>
      </div>
      <button style="font-size:12px; padding:6px 14px; border-color:var(--color-border-info); color:var(--color-text-info);">Начать</button>
    </div>

    <div style="display:flex; align-items:center; gap:12px; background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:14px; opacity:0.6;">
      <div style="width:28px; height:28px; border-radius:50%; background:var(--color-background-secondary); color:var(--color-text-tertiary); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:500;">3</div>
      <div style="flex:1;">
        <div style="font-size:13px; font-weight:500;">Запустить Planning Mode</div>
        <div style="font-size:12px; color:var(--color-text-secondary);">Поставь задачу — команда найдёт решение.</div>
      </div>
    </div>

  </div>

  <div style="display:flex; align-items:center; justify-content:center; gap:6px; margin-top:18px;">
    <span style="width:18px; height:4px; border-radius:2px; background:var(--color-text-info);"></span>
    <span style="width:6px; height:4px; border-radius:2px; background:var(--color-border-secondary);"></span>
    <span style="width:6px; height:4px; border-radius:2px; background:var(--color-border-secondary);"></span>
  </div>
</div>
</div>
</body>
</html>
