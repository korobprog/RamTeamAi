<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RamTeamAi — решение и Build</title>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
</head>
<body>
<div class="canvas">
<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 16px;">

<div style="display:grid; grid-template-columns:1fr 230px; gap:12px;">

  <div style="background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:14px 16px;">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
      <span style="font-weight:500; font-size:14px;"><i class="ti ti-clipboard-check" aria-hidden="true"></i> Решение команды</span>
      <span style="font-size:11px; color:var(--color-text-tertiary);">редактируемо</span>
    </div>

    <div style="font-size:12px; color:var(--color-text-tertiary); margin:8px 0 4px;">Стек</div>
    <div style="font-size:13px; color:var(--color-text-primary);">Tauri 2 + React/TS + Rust core + SQLite</div>

    <div style="font-size:12px; color:var(--color-text-tertiary); margin:12px 0 6px;">Шаги</div>
    <div style="display:flex; flex-direction:column; gap:6px;">
      <div style="display:flex; align-items:center; gap:8px; font-size:13px; padding:6px 8px; background:var(--color-background-secondary); border-radius:6px;"><i class="ti ti-grip-vertical" aria-hidden="true" style="color:var(--color-text-tertiary);"></i> 1. Слой адаптеров провайдеров</div>
      <div style="display:flex; align-items:center; gap:8px; font-size:13px; padding:6px 8px; background:var(--color-background-secondary); border-radius:6px;"><i class="ti ti-grip-vertical" aria-hidden="true" style="color:var(--color-text-tertiary);"></i> 2. Оркестратор суб-агентов</div>
      <div style="display:flex; align-items:center; gap:8px; font-size:13px; padding:6px 8px; background:var(--color-background-info); color:var(--color-text-info); border-radius:6px;"><i class="ti ti-pencil" aria-hidden="true"></i> 3. MCP + веб-поиск <span style="margin-left:auto; font-size:11px;">правка</span></div>
      <div style="display:flex; align-items:center; gap:8px; font-size:13px; padding:6px 8px; background:var(--color-background-secondary); border-radius:6px;"><i class="ti ti-grip-vertical" aria-hidden="true" style="color:var(--color-text-tertiary);"></i> 4. Planning Mode</div>
    </div>
    <button style="font-size:12px; padding:5px 10px; margin-top:10px;"><i class="ti ti-plus" aria-hidden="true"></i> Добавить шаг</button>
  </div>

  <div style="display:flex; flex-direction:column; gap:12px;">
    <div style="background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:12px 14px;">
      <div style="font-size:12px; color:var(--color-text-tertiary); margin-bottom:8px;"><i class="ti ti-folder" aria-hidden="true"></i> Будущий проект</div>
      <div style="font-family:var(--font-mono); font-size:12px; line-height:1.9; color:var(--color-text-secondary);">
        RamTeamAi/<br>
        ├─ src-tauri/<br>
        ├─ src/<br>
        │&nbsp;&nbsp;├─ agents/<br>
        │&nbsp;&nbsp;└─ providers/<br>
        └─ README.md
      </div>
    </div>

    <button style="font-size:14px; padding:10px; border-color:var(--color-border-info); color:var(--color-text-info); background:var(--color-background-info);"><i class="ti ti-hammer" aria-hidden="true"></i> Build проект</button>
    <span style="font-size:11px; color:var(--color-text-tertiary); text-align:center;">создаст файлы на диске</span>
  </div>

</div>
</div>
</div>
</body>
</html>
