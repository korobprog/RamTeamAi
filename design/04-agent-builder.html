<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RamTeamAi — конструктор агента</title>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
</head>
<body>
<div class="canvas">
<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 16px;">

<div style="background:var(--color-background-primary); border:0.5px solid var(--color-border-tertiary); border-radius:var(--border-radius-lg); padding:16px 18px;">
  <div style="display:flex; align-items:center; gap:10px; margin-bottom:14px;">
    <div style="width:38px; height:38px; border-radius:50%; background:#EEEDFE; display:flex; align-items:center; justify-content:center; color:#534AB7; font-weight:500;"><i class="ti ti-robot" aria-hidden="true" style="font-size:20px;"></i></div>
    <div>
      <input type="text" value="Архитектор" style="font-weight:500; font-size:14px; height:30px;" />
    </div>
  </div>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px 14px;">
    <div>
      <label style="font-size:12px; color:var(--color-text-secondary);">Провайдер</label>
      <select style="width:100%;"><option>Anthropic</option><option>OpenAI</option><option>Gemini</option><option>My LLM Gateway (custom)</option></select>
    </div>
    <div>
      <label style="font-size:12px; color:var(--color-text-secondary);">Модель</label>
      <select style="width:100%;"><option>Claude Opus 4.8</option><option>Claude Sonnet 4.6</option></select>
    </div>
    <div>
      <label style="font-size:12px; color:var(--color-text-secondary);">Роль</label>
      <select style="width:100%;"><option>Архитектор</option><option>Критик</option><option>Исследователь</option><option>Реализатор</option></select>
    </div>
    <div>
      <label style="font-size:12px; color:var(--color-text-secondary);">Бюджет токенов</label>
      <input type="text" value="40 000 / раунд" style="width:100%;" />
    </div>
  </div>

  <div style="margin-top:14px;">
    <label style="font-size:12px; color:var(--color-text-secondary);">Системный промпт</label>
    <textarea style="width:100%; min-height:64px; font-size:13px;">Ты ведущий архитектор. Проектируй слои и интерфейсы, держи решения модульными, опирайся на находки исследователя.</textarea>
  </div>

  <div style="margin-top:14px;">
    <span style="font-size:12px; color:var(--color-text-secondary);">Инструменты</span>
    <div style="display:flex; gap:6px; margin-top:6px; flex-wrap:wrap;">
      <span style="font-size:11px; padding:4px 10px; background:var(--color-background-info); color:var(--color-text-info); border-radius:6px;"><i class="ti ti-world-search" aria-hidden="true"></i> Web search</span>
      <span style="font-size:11px; padding:4px 10px; background:var(--color-background-info); color:var(--color-text-info); border-radius:6px;"><i class="ti ti-folder" aria-hidden="true"></i> Файлы проекта</span>
      <span style="font-size:11px; padding:4px 10px; background:var(--color-background-info); color:var(--color-text-info); border-radius:6px;"><i class="ti ti-plug" aria-hidden="true"></i> MCP: github</span>
      <span style="font-size:11px; padding:4px 10px; background:var(--color-background-secondary); color:var(--color-text-tertiary); border-radius:6px;"><i class="ti ti-plus" aria-hidden="true"></i> добавить</span>
    </div>
  </div>

  <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:16px; padding-top:12px; border-top:0.5px solid var(--color-border-tertiary);">
    <button style="font-size:13px;">Отмена</button>
    <button style="font-size:13px; border-color:var(--color-border-info); color:var(--color-text-info);">Сохранить агента</button>
  </div>
</div>
</div>
</div>
</body>
</html>
